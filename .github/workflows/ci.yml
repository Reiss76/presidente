name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --workspaces

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Backend health smoke test
        run: |
          node apps/backend/dist/main.js &
          APP_PID=$!
          sleep 8
          curl -fsS http://127.0.0.1:8080/health | grep '"ok":true'
          kill $APP_PID
